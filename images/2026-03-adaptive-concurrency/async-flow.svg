<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 432" font-family="'SFMono-Regular', 'Roboto Mono', Menlo, Courier, monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#238636"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="432" fill="#0d1117" rx="8"/>

  <!-- ==================== PART 1: ENQUEUE ==================== -->
  <text x="30" y="30" fill="#e6edf3" font-size="14" font-weight="bold">1. Enqueue — caller submits work</text>
  <line x1="30" y1="38" x2="330" y2="38" stroke="#30363d" stroke-width="1"/>

  <!-- Caller box -->
  <rect x="30" y="55" width="170" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="115" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Caller</text>
  <text x="115" y="96" fill="#7ee787" font-size="11" text-anchor="middle">Call returns</text>
  <text x="115" y="112" fill="#7ee787" font-size="11" text-anchor="middle">immediately</text>

  <!-- Arrow: Caller → Gateway -->
  <line x1="200" y1="78" x2="363" y2="78" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="281" y="70" fill="#8b949e" font-size="10" text-anchor="middle">POST /async-function/pdf</text>

  <!-- Return: 202 Accepted -->
  <line x1="363" y1="100" x2="200" y2="100" stroke="#238636" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-grn)"/>
  <text x="279" y="118" fill="#7ee787" font-size="10" text-anchor="middle">202 Accepted</text>
  <text x="279" y="130" fill="#7ee787" font-size="10" text-anchor="middle">X-Call-Id: e7f...</text>

  <!-- Gateway box -->
  <rect x="363" y="55" width="170" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="448" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Gateway</text>
  <text x="448" y="96" fill="#8b949e" font-size="11" text-anchor="middle">Serialise to queue</text>

  <!-- Arrow: Gateway → NATS -->
  <line x1="533" y1="88" x2="633" y2="88" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="580" y="80" fill="#8b949e" font-size="10" text-anchor="middle">Publish</text>

  <!-- NATS box -->
  <rect x="633" y="55" width="210" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="738" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">NATS JetStream</text>
  <text x="738" y="96" fill="#8b949e" font-size="11" text-anchor="middle">Durable queue</text>
  <text x="738" y="112" fill="#8b949e" font-size="10" text-anchor="middle">X-Call-Id: e7f...</text>

  <!-- ==================== PART 2: DEQUEUE ==================== -->
  <text x="30" y="215" fill="#e6edf3" font-size="14" font-weight="bold">2. Dequeue — queue-worker processes invocation</text>
  <line x1="30" y1="223" x2="440" y2="223" stroke="#30363d" stroke-width="1"/>

  <!-- NATS box (dequeue side) -->
  <rect x="30" y="240" width="210" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="135" y="263" fill="#e6edf3" font-size="13" text-anchor="middle">NATS JetStream</text>
  <text x="135" y="281" fill="#8b949e" font-size="11" text-anchor="middle">Durable queue</text>
  <text x="135" y="297" fill="#8b949e" font-size="10" text-anchor="middle">X-Call-Id: e7f...</text>

  <!-- Arrow: NATS → Queue-Worker -->
  <line x1="240" y1="275" x2="333" y2="275" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="284" y="267" fill="#8b949e" font-size="10" text-anchor="middle">Subscribe</text>

  <!-- Queue-Worker box -->
  <rect x="333" y="240" width="180" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="423" y="263" fill="#e6edf3" font-size="13" text-anchor="middle">Queue-Worker</text>
  <text x="423" y="281" fill="#8b949e" font-size="11" text-anchor="middle">Dequeue &amp; dispatch</text>
  <text x="423" y="297" fill="#8b949e" font-size="10" text-anchor="middle">X-Call-Id: e7f...</text>

  <!-- Arrow: Queue-Worker → Function -->
  <line x1="513" y1="272" x2="663" y2="272" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="588" y="265" fill="#8b949e" font-size="10" text-anchor="middle">POST /function/pdf</text>

  <!-- Function box -->
  <rect x="663" y="240" width="180" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="753" y="263" fill="#e6edf3" font-size="13" text-anchor="middle">Function</text>
  <text x="753" y="281" fill="#8b949e" font-size="11" text-anchor="middle">Processes request</text>

  <!-- Response arrow: Function → Queue-Worker -->
  <line x1="663" y1="290" x2="513" y2="290" stroke="#4a9eff" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="588" y="305" fill="#4a9eff" font-size="10" text-anchor="middle">Response</text>

  <!-- Callback arrow: Queue-Worker → Callback URL -->
  <line x1="423" y1="320" x2="423" y2="362" stroke="#4a9eff" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="515" y="338" fill="#4a9eff" font-size="10" text-anchor="middle">POST result to</text>
  <text x="515" y="350" fill="#4a9eff" font-size="10" text-anchor="middle">X-Callback-Url (optional)</text>

  <!-- Callback URL box -->
  <rect x="333" y="362" width="180" height="60" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="423" y="388" fill="#e6edf3" font-size="13" text-anchor="middle">Callback URL</text>
  <text x="423" y="406" fill="#8b949e" font-size="10" text-anchor="middle">(optional)</text>

</svg>
