<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'SFMono-Regular', 'Roboto Mono', Menlo, Courier, monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e06060"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#238636"/>
    </marker>
    <marker id="arr-time" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0d1117" rx="8"/>

  <!-- ==================== GREEDY ==================== -->
  <text x="30" y="30" fill="#e6edf3" font-size="14" font-weight="bold">Greedy Dispatch</text>
  <line x1="30" y1="38" x2="180" y2="38" stroke="#30363d" stroke-width="1"/>

  <!-- Queue-Worker box -->
  <rect x="30" y="55" width="190" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="125" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Queue-Worker</text>
  <text x="125" y="96" fill="#8b949e" font-size="11" text-anchor="middle">500 msgs queued</text>
  <text x="125" y="112" fill="#8b949e" font-size="11" text-anchor="middle">Sends all at once</text>

  <!-- Arrow: send all -->
  <line x1="220" y1="95" x2="430" y2="95" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="325" y="87" fill="#8b949e" font-size="10" text-anchor="middle">Invoke via gateway using HTTP</text>

  <!-- Function box -->
  <rect x="435" y="55" width="230" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="550" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Function <tspan fill="#8b949e" font-size="10">(max_inflight=5)</tspan></text>
  <text x="450" y="98" fill="#7ee787" font-size="11">──► 5 succeed (2xx)</text>
  <text x="450" y="114" fill="#e06060" font-size="11">──► 495 rejected (429)</text>

  <!-- Return arrow: from center-bottom of Function to center-bottom of Queue-Worker -->
  <line x1="550" y1="135" x2="550" y2="165" stroke="#e06060" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="550" y1="165" x2="125" y2="165" stroke="#e06060" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="125" y1="165" x2="125" y2="142" stroke="#e06060" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-red)"/>
  <text x="337" y="159" fill="#e06060" font-size="10" text-anchor="middle">Exponential back-off &amp; retry</text>

  <!-- Timeline -->
  <line x1="30" y1="205" x2="730" y2="205" stroke="#30363d" stroke-width="1" marker-end="url(#arr-time)"/>
  <text x="740" y="209" fill="#8b949e" font-size="9">Time</text>

  <!-- Bars: burst-retry pattern -->
  <rect x="40" y="193" width="55" height="10" fill="#4a9eff" rx="3"/>
  <rect x="95" y="193" width="45" height="10" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="3"/>
  <rect x="140" y="193" width="45" height="10" fill="#e0a030" rx="3"/>
  <rect x="185" y="193" width="55" height="10" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="3"/>
  <rect x="240" y="193" width="40" height="10" fill="#e0a030" rx="3"/>
  <rect x="280" y="193" width="65" height="10" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="3"/>
  <rect x="345" y="193" width="35" height="10" fill="#e0a030" rx="3"/>
  <rect x="380" y="193" width="75" height="10" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="3"/>
  <rect x="455" y="193" width="30" height="10" fill="#e0a030" rx="3"/>
  <rect x="485" y="193" width="85" height="10" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="3"/>
  <rect x="570" y="193" width="25" height="10" fill="#e0a030" rx="3"/>
  <rect x="595" y="193" width="85" height="10" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="3"/>
  <rect x="680" y="193" width="30" height="10" fill="#4a9eff" rx="3"/>

  <!-- Done marker greedy -->
  <line x1="710" y1="188" x2="710" y2="225" stroke="#e06060" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="718" y="223" fill="#e06060" font-size="9">Done</text>

  <!-- Legend greedy -->
  <rect x="40" y="222" width="8" height="8" fill="#4a9eff" rx="2"/>
  <text x="53" y="230" fill="#8b949e" font-size="9">Send</text>
  <rect x="100" y="222" width="8" height="8" fill="#161b22" stroke="#30363d" stroke-width="0.5" rx="2"/>
  <text x="113" y="230" fill="#8b949e" font-size="9">Back-off</text>
  <rect x="175" y="222" width="8" height="8" fill="#e0a030" rx="2"/>
  <text x="188" y="230" fill="#8b949e" font-size="9">Retry</text>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="30" y1="258" x2="850" y2="258" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ==================== ADAPTIVE ==================== -->
  <text x="30" y="290" fill="#e6edf3" font-size="14" font-weight="bold">Adaptive Concurrency</text>
  <line x1="30" y1="298" x2="230" y2="298" stroke="#30363d" stroke-width="1"/>

  <!-- Queue-Worker box -->
  <rect x="30" y="314" width="190" height="118" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="125" y="337" fill="#e6edf3" font-size="13" text-anchor="middle">Queue-Worker</text>
  <text x="125" y="355" fill="#8b949e" font-size="11" text-anchor="middle">500 msgs queued</text>
  <text x="125" y="371" fill="#8b949e" font-size="11" text-anchor="middle">Sends 5, holds rest</text>
  <text x="125" y="390" fill="#7ee787" font-size="11" text-anchor="middle">~~~ waiting ~~~</text>
  <text x="125" y="407" fill="#8b949e" font-size="10" text-anchor="middle">Drains as capacity</text>
  <text x="125" y="419" fill="#8b949e" font-size="10" text-anchor="middle">Becomes available</text>

  <!-- Arrow: send matching capacity -->
  <line x1="220" y1="345" x2="430" y2="345" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="325" y="337" fill="#8b949e" font-size="10" text-anchor="middle">Invoke via gateway using HTTP</text>

  <!-- Function box -->
  <rect x="435" y="314" width="230" height="108" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="550" y="337" fill="#e6edf3" font-size="13" text-anchor="middle">Function <tspan fill="#8b949e" font-size="10">(max_inflight=5)</tspan></text>
  <text x="450" y="359" fill="#7ee787" font-size="11">──► all succeed (2xx)</text>
  <text x="450" y="377" fill="#7ee787" font-size="11">──► limit increased</text>
  <text x="450" y="395" fill="#8b949e" font-size="11">    replicas scaling up</text>

  <!-- Feedback arrow: from center-bottom of Function to center-bottom of Queue-Worker -->
  <line x1="550" y1="422" x2="550" y2="458" stroke="#238636" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="550" y1="458" x2="125" y2="458" stroke="#238636" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="125" y1="458" x2="125" y2="432" stroke="#238636" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-grn)"/>
  <text x="337" y="452" fill="#7ee787" font-size="10" text-anchor="middle">Feedback ── adjust concurrency</text>

  <!-- Timeline -->
  <line x1="30" y1="493" x2="730" y2="493" stroke="#30363d" stroke-width="1" marker-end="url(#arr-time)"/>
  <text x="740" y="497" fill="#8b949e" font-size="9">Time</text>

  <!-- Bar: steady dispatch -->
  <rect x="40" y="481" width="440" height="10" fill="#238636" rx="3"/>

  <!-- Done marker adaptive -->
  <line x1="480" y1="476" x2="480" y2="513" stroke="#238636" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="488" y="511" fill="#7ee787" font-size="9">Done ~50% faster</text>

  <!-- Legend adaptive -->
  <rect x="40" y="513" width="8" height="8" fill="#238636" rx="2"/>
  <text x="53" y="521" fill="#8b949e" font-size="9">Steady dispatch</text>
</svg>
