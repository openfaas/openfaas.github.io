<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 175" font-family="'SFMono-Regular', 'Roboto Mono', Menlo, Courier, monospace" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="175" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="30" y="30" fill="#e6edf3" font-size="14" font-weight="bold">Synchronous Invocation</text>
  <line x1="30" y1="38" x2="250" y2="38" stroke="#30363d" stroke-width="1"/>

  <!-- Caller box -->
  <rect x="30" y="55" width="170" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="115" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Caller</text>
  <text x="115" y="96" fill="#e0a030" font-size="11" text-anchor="middle">Blocked until done</text>
  <text x="115" y="112" fill="#8b949e" font-size="11" text-anchor="middle">Waits for response</text>

  <!-- Arrow: Caller → Gateway -->
  <line x1="200" y1="82" x2="345" y2="82" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="270" y="74" fill="#8b949e" font-size="10" text-anchor="middle">POST /function/pdf</text>

  <!-- Gateway box -->
  <rect x="345" y="55" width="170" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="430" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Gateway</text>
  <text x="430" y="96" fill="#8b949e" font-size="11" text-anchor="middle">Proxy to function</text>

  <!-- Arrow: Gateway → Function -->
  <line x1="515" y1="82" x2="650" y2="82" stroke="#30363d" stroke-width="1" marker-end="url(#arr)"/>
  <text x="580" y="74" fill="#8b949e" font-size="10" text-anchor="middle">Invoke</text>

  <!-- Function box -->
  <rect x="650" y="55" width="190" height="80" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="745" y="78" fill="#e6edf3" font-size="13" text-anchor="middle">Function</text>
  <text x="745" y="96" fill="#8b949e" font-size="11" text-anchor="middle">Processes request</text>

  <!-- Return arrow: L-shaped from Function bottom to Caller bottom -->
  <line x1="745" y1="135" x2="745" y2="158" stroke="#4a9eff" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="745" y1="158" x2="115" y2="158" stroke="#4a9eff" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="115" y1="158" x2="115" y2="142" stroke="#4a9eff" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="430" y="152" fill="#4a9eff" font-size="10" text-anchor="middle">Response (PDF) ── caller blocked for full duration</text>

</svg>
