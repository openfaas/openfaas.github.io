<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'SFMono-Regular', 'Roboto Mono', Menlo, Courier, monospace" font-size="11">
  <!-- Background -->
  <rect width="880" height="380" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="440" y="38" fill="#e6edf3" font-size="16" font-weight="bold" text-anchor="middle">OpenFaaS Python SDK</text>

  <!-- ==================== Column 1: Auth ==================== -->
  <text x="30" y="78" fill="#8b949e" font-size="10" font-weight="bold">Auth</text>
  <line x1="30" y1="84" x2="225" y2="84" stroke="#30363d" stroke-width="1"/>

  <rect x="30" y="95" width="195" height="52" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="127" y="116" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">BasicAuth</text>
  <text x="127" y="133" fill="#8b949e" font-size="9" text-anchor="middle">shared credentials</text>

  <rect x="30" y="157" width="195" height="64" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="127" y="178" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">TokenAuth</text>
  <text x="127" y="195" fill="#8b949e" font-size="9" text-anchor="middle">OpenFaaS IAM</text>
  <text x="127" y="209" fill="#8b949e" font-size="9" text-anchor="middle">pluggable: any OIDC IdP</text>

  <!-- ==================== Column 2: Gateway API (stacked) ==================== -->
  <text x="245" y="78" fill="#8b949e" font-size="10" font-weight="bold">Gateway API</text>
  <line x1="245" y1="84" x2="440" y2="84" stroke="#30363d" stroke-width="1"/>

  <rect x="245" y="95" width="195" height="52" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="342" y="116" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Functions</text>
  <text x="342" y="133" fill="#8b949e" font-size="9" text-anchor="middle">deploy &#8226; update &#8226; get &#8226; delete</text>

  <rect x="245" y="157" width="195" height="52" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="342" y="178" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Namespaces</text>
  <text x="342" y="195" fill="#8b949e" font-size="9" text-anchor="middle">create &#8226; update &#8226; get &#8226; delete</text>

  <rect x="245" y="219" width="195" height="52" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="342" y="240" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Secrets</text>
  <text x="342" y="257" fill="#8b949e" font-size="9" text-anchor="middle">create &#8226; update &#8226; list &#8226; delete</text>

  <rect x="245" y="281" width="195" height="52" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="342" y="302" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Logs</text>
  <text x="342" y="319" fill="#8b949e" font-size="9" text-anchor="middle">stream &#8226; filter by time</text>

  <!-- ==================== Column 3: Function Invocations ==================== -->
  <text x="460" y="78" fill="#8b949e" font-size="10" font-weight="bold">Function Invocations</text>
  <line x1="460" y1="84" x2="655" y2="84" stroke="#30363d" stroke-width="1"/>

  <rect x="460" y="95" width="195" height="64" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="557" y="116" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Synchronous</text>
  <text x="557" y="133" fill="#8b949e" font-size="9" text-anchor="middle">invoke_function</text>
  <text x="557" y="147" fill="#8b949e" font-size="9" text-anchor="middle">block for response</text>

  <rect x="460" y="169" width="195" height="64" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="557" y="190" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Asynchronous</text>
  <text x="557" y="207" fill="#8b949e" font-size="9" text-anchor="middle">invoke_function_async</text>
  <text x="557" y="221" fill="#8b949e" font-size="9" text-anchor="middle">queued via gateway</text>

  <!-- ==================== Column 4: Function Builder ==================== -->
  <text x="675" y="78" fill="#8b949e" font-size="10" font-weight="bold">Function Builder</text>
  <line x1="675" y1="84" x2="850" y2="84" stroke="#30363d" stroke-width="1"/>

  <rect x="675" y="95" width="175" height="78" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="762" y="116" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">Build functions</text>
  <text x="762" y="130" fill="#e6edf3" font-size="11" text-anchor="middle" font-weight="bold">from source</text>
  <text x="762" y="150" fill="#8b949e" font-size="9" text-anchor="middle">create_build_context</text>
  <text x="762" y="163" fill="#8b949e" font-size="9" text-anchor="middle">make_tar &#8226; build</text>
</svg>
